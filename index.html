<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Scorer - Liga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BadmintonScorer = () => {
            const [team1Name, setTeam1Name] = useState('');
            const [team2Name, setTeam2Name] = useState('');
            const [team1Logo, setTeam1Logo] = useState('');
            const [team2Logo, setTeam2Logo] = useState('');
            
            const [score1, setScore1] = useState(0);
            const [score2, setScore2] = useState(0);
            const [sets1, setSets1] = useState(0);
            const [sets2, setSets2] = useState(0);
            const [lastScorer, setLastScorer] = useState(1);
            const [connected, setConnected] = useState(false);
            const [setHistory, setSetHistory] = useState([]);
            
            const ws = useRef(null);
            const isDisplay = new URLSearchParams(window.location.search).get('display') === 'true';

            // WebSocket connection
            useEffect(() => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                
                ws.current = new WebSocket(wsUrl);
                
                ws.current.onopen = () => {
                    console.log('✅ Połączono z serwerem');
                    setConnected(true);
                };
                
                ws.current.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'init' || data.type === 'update') {
                        const state = data.state;
                        setTeam1Name(state.team1Name);
                        setTeam2Name(state.team2Name);
                        setTeam1Logo(state.team1Logo);
                        setTeam2Logo(state.team2Logo);
                        setScore1(state.score1);
                        setScore2(state.score2);
                        setSets1(state.sets1);
                        setSets2(state.sets2);
                        setLastScorer(state.lastScorer);
                        setSetHistory(state.setHistory || []);
                    }
                };
                
                ws.current.onclose = () => {
                    console.log('❌ Rozłączono z serwerem');
                    setConnected(false);
                };
                
                ws.current.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
                
                return () => {
                    if (ws.current) {
                        ws.current.close();
                    }
                };
            }, []);

            const sendUpdate = (newState) => {
                if (ws.current && ws.current.readyState === WebSocket.OPEN) {
                    ws.current.send(JSON.stringify({
                        type: 'update',
                        state: newState
                    }));
                }
            };

            const updateState = (updates) => {
                const newState = {
                    team1Name,
                    team2Name,
                    team1Logo,
                    team2Logo,
                    score1,
                    score2,
                    sets1,
                    sets2,
                    lastScorer,
                    setHistory,
                    ...updates
                };
                sendUpdate(newState);
            };

            const addPoint = (team) => {
                // Sprawdź czy mecz się już nie zakończył (2:0 lub 2:1)
                if (sets1 === 2 || sets2 === 2) {
                    return; // Nie dodawaj punktów jeśli mecz się skończył
                }
                
                if (team === 1) {
                    const newScore = score1 + 1;
                    if (newScore == 15) {
                        const newHistory = [...setHistory, { team1: newScore, team2: score2 }];
                        updateState({ score1: 0, score2: 0, sets1: sets1 + 1, lastScorer: 1, setHistory: newHistory });
                    } else {
                        updateState({ score1: newScore, lastScorer: 1 });
                    }
                } else {
                    const newScore = score2 + 1;
                    if (newScore == 15) {
                        const newHistory = [...setHistory, { team1: score1, team2: newScore }];
                        updateState({ score1: 0, score2: 0, sets2: sets2 + 1, lastScorer: 2, setHistory: newHistory });
                    } else {
                        updateState({ score2: newScore, lastScorer: 2 });
                    }
                }
            };

            const removePoint = (team) => {

                
                if (team === 1 && score1 > 0) {
                    updateState({ score1: score1 - 1 });
                } else if (team === 2 && score2 > 0) {
                    updateState({ score2: score2 - 1 });
                }
            };

            const reset = () => {
                updateState({ score1: 0, score2: 0, sets1: 0, sets2: 0, lastScorer: 1, setHistory: [] });
            };

            const resetSet = () => {


                updateState({ score1: 0, score2: 0 });
            };

            const updateTeamName = (team, name) => {
                if (team === 1) {
                    updateState({ team1Name: name });
                } else {
                    updateState({ team2Name: name });
                }
            };

            const updateTeamLogo = (team, logo) => {
                if (team === 1) {
                    updateState({ team1Logo: logo });
                } else {
                    updateState({ team2Logo: logo });
                }
            };

            const truncateName = (name) => {
                if (name.length > 22) {
                    return name.substring(0, 22);
                }
                return name;
            };

            const isMatchFinished = () => {
                return sets1 === 2 || sets2 === 2;
            };

            // Widok dla OBS
            if (isDisplay) {
                return (
                    <div className="w-full h-screen bg-transparent flex items-center justify-center p-4">
                        <div className="w-full max-w-xl">
                            {/* Drużyna 1 */}
                            <div className={`flex items-center justify-between p-4 mb-1 ${lastScorer === 1 ? 'bg-blue-600' : 'bg-gray-800'} transition-colors duration-300`}>
                                <div className="flex items-center gap-4 flex-1 min-w-0">
                                    {team1Logo && (
                                        <img src={team1Logo} alt="Logo" className="w-12 h-12 object-contain flex-shrink-0" />
                                    )}
                                    <span className="text-white font-bold text-2xl truncate">{truncateName(team1Name)}</span>
                                </div>
                                <div className="flex items-center gap-3 flex-shrink-0">
                                    {/* Historia setów - 3 pola */}
                                    {[0, 1, 2].map((index) => (
                                        <div key={index} className="text-center min-w-[50px]">
                                            {setHistory[index] ? (
                                                <span className="text-2xl font-bold px-2 py-1 text-white">
                                                    {setHistory[index].team1}
                                                </span>
                                            ) : index === 2 && (score1 > 0 || score2 > 0) ? (
                                                <span className="text-4xl font-bold px-2 text-white">{score1}</span>
                                            ) : (
                                                <span className="text-gray-600 text-2xl px-2">-</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Drużyna 2 */}
                            <div className={`flex items-center justify-between p-4 ${lastScorer === 2 ? 'bg-blue-600' : 'bg-gray-800'} transition-colors duration-300`}>
                                <div className="flex items-center gap-4 flex-1 min-w-0">
                                    {team2Logo && (
                                        <img src={team2Logo} alt="Logo" className="w-12 h-12 object-contain flex-shrink-0" />
                                    )}
                                    <span className="text-white font-bold text-2xl truncate">{truncateName(team2Name)}</span>
                                </div>
                                <div className="flex items-center gap-3 flex-shrink-0">
                                    {/* Historia setów - 3 pola */}
                                    {[0, 1, 2].map((index) => (
                                        <div key={index} className="text-center min-w-[50px]">
                                            {setHistory[index] ? (
                                                <span className="text-2xl font-bold px-2 py-1 text-white">
                                                    {setHistory[index].team2}
                                                </span>
                                            ) : index === 2 && (score1 > 0 || score2 > 0) ? (
                                                <span className="text-4xl font-bold px-2 text-white">{score2}</span>
                                            ) : (
                                                <span className="text-gray-600 text-2xl px-2">-</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Status połączenia */}
                            {!connected && (
                                <div className="mt-2 bg-red-600 text-white text-center py-1 text-sm">
                                    Brak połączenia z serwerem
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Ikony SVG
            const PlusIcon = () => (
                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                </svg>
            );

            const MinusIcon = () => (
                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" />
                </svg>
            );

            const RotateIcon = () => (
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            );

            // Panel operatora
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex items-center justify-between mb-8">
                            <h1 className="text-4xl font-bold text-indigo-900">Panel Operatora - Liga Badmintona</h1>
                            <div className={`flex items-center gap-2 px-4 py-2 rounded-full ${connected ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                <div className={`w-3 h-3 rounded-full ${connected ? 'bg-green-500' : 'bg-red-500'} animate-pulse`}></div>
                                <span className="font-medium">{connected ? 'Połączono' : 'Rozłączono'}</span>
                            </div>
                        </div>

                        {/* Komunikat o zakończeniu meczu */}
                        {isMatchFinished() && (
                            <div className="bg-green-500 text-white rounded-lg shadow-lg p-6 mb-6 text-center">
                                <h2 className="text-3xl font-bold mb-2">🏆 MECZ ZAKOŃCZONY 🏆</h2>
                                <p className="text-sm mt-2 opacity-90">
                                    Użyj "Reset Meczu" aby rozpocząć nowy mecz
                                </p>
                            </div>
                        )}
                        
                        {/* Link do wyświetlacza */}
                                                    <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                            <h2 className="text-xl font-bold mb-3">🎥 Link dla OBS (Browser Source)</h2>
                            <div className="bg-gray-100 p-3 rounded border border-gray-300 break-all text-sm font-mono">
                                http://localhost:3000?display=true
                            </div>
                            <p className="text-sm text-gray-600 mt-2">
                                Skopiuj ten link i dodaj jako "Browser Source" w OBS. Ustaw szerokość: 600px, wysokość: 180px
                            </p>
                        </div>

                        {/* Ustawienia drużyn */}
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                            <h2 className="text-xl font-bold mb-4">Ustawienia Drużyn</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* Drużyna 1 */}
                                <div>
                                    <label className="block text-sm font-medium mb-2">Drużyna 1 (Nazwisko Imię lub same nazwiska)</label>
                                    <input
                                        type="text"
                                        value={team1Name}
                                        onChange={(e) => updateTeamName(1, e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg mb-3"
                                        placeholder="KOWALSKI Jan"
                                    />
                                    <label className="block text-sm font-medium mb-2">Logo URL (opcjonalne)</label>
                                    <input
                                        type="text"
                                        value={team1Logo}
                                        onChange={(e) => updateTeamLogo(1, e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg"
                                        placeholder="https://example.com/logo.png"
                                    />
                                </div>

                                {/* Drużyna 2 */}
                                <div>
                                    <label className="block text-sm font-medium mb-2">Drużyna 2 (Nazwisko Imię lub same nazwiska)</label>
                                    <input
                                        type="text"
                                        value={team2Name}
                                        onChange={(e) => updateTeamName(2, e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg mb-3"
                                        placeholder="NOWAK Anna"
                                    />
                                    <label className="block text-sm font-medium mb-2">Logo URL (opcjonalne)</label>
                                    <input
                                        type="text"
                                        value={team2Logo}
                                        onChange={(e) => updateTeamLogo(2, e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg"
                                        placeholder="https://example.com/logo.png"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Historia setów w panelu operatora */}
                        {setHistory.length > 0 && (
                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <h2 className="text-xl font-bold mb-4">Historia Setów</h2>
                                <div className="flex gap-4 justify-center">
                                    {setHistory.map((set, index) => (
                                        <div key={index} className="text-center bg-gray-100 px-6 py-3 rounded-lg">
                                            <div className="text-xs text-gray-600 mb-1">Set {index + 1}</div>
                                            <div className="text-4xl font-bold">
                                                <span className="text-gray-800">
                                                    {set.team1}
                                                </span>
                                                <span className="text-gray-400 mx-2">:</span>
                                                <span className="text-gray-800">
                                                    {set.team2}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Panel sterowania */}
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {/* Drużyna 1 */}
                                <div className="border-4 border-indigo-500 rounded-lg p-6">
                                    <h3 className="text-2xl font-bold mb-4 text-center truncate">{team1Name}</h3>
                                    <div className="text-center mb-6">
                                        <div className="text-sm text-gray-600 mb-2">Wygrane Sety</div>
                                        <div className="text-5xl font-bold text-indigo-600 mb-4">{sets1}</div>
                                        <div className="text-sm text-gray-600 mb-2">Punkty</div>
                                        <div className="text-7xl font-bold text-indigo-900">{score1}</div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => addPoint(1)}
                                            disabled={isMatchFinished()}
                                            className={`flex-1 ${isMatchFinished() ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-6 rounded-lg flex items-center justify-center gap-2 text-2xl transition-colors`}
                                        >
                                            <PlusIcon />
                                            Punkt
                                        </button>
                                        <button
                                            onClick={() => removePoint(1)}
                                            disabled={isMatchFinished()}
                                            className={`flex-1 ${isMatchFinished() ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-500 hover:bg-red-600'} text-white font-bold py-6 rounded-lg flex items-center justify-center gap-2 text-2xl transition-colors`}
                                        >
                                            <MinusIcon />
                                            Cofnij
                                        </button>
                                    </div>
                                </div>

                                {/* Drużyna 2 */}
                                <div className="border-4 border-purple-500 rounded-lg p-6">
                                    <h3 className="text-2xl font-bold mb-4 text-center truncate">{team2Name}</h3>
                                    <div className="text-center mb-6">
                                        <div className="text-sm text-gray-600 mb-2">Wygrane Sety</div>
                                        <div className="text-5xl font-bold text-purple-600 mb-4">{sets2}</div>
                                        <div className="text-sm text-gray-600 mb-2">Punkty</div>
                                        <div className="text-7xl font-bold text-purple-900">{score2}</div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => addPoint(2)}
                                            disabled={isMatchFinished()}
                                            className={`flex-1 ${isMatchFinished() ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-6 rounded-lg flex items-center justify-center gap-2 text-2xl transition-colors`}
                                        >
                                            <PlusIcon />
                                            Punkt
                                        </button>
                                        <button
                                            onClick={() => removePoint(2)}
                                            disabled={isMatchFinished()}
                                            className={`flex-1 ${isMatchFinished() ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-500 hover:bg-red-600'} text-white font-bold py-6 rounded-lg flex items-center justify-center gap-2 text-2xl transition-colors`}
                                        >
                                            <MinusIcon />
                                            Cofnij
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Przyciski resetowania */}
                            <div className="mt-6 flex gap-3">
                                <button
                                    onClick={resetSet}
                                    disabled={isMatchFinished()}
                                    className={`flex-1 ${isMatchFinished() ? 'bg-gray-400 cursor-not-allowed' : 'bg-yellow-500 hover:bg-yellow-600'} text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 text-xl transition-colors`}
                                >
                                    <RotateIcon />
                                    Reset Seta
                                </button>
                                <button
                                    onClick={reset}
                                    className="flex-1 bg-gray-700 hover:bg-gray-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 text-xl transition-colors"
                                >
                                    <RotateIcon />
                                    Reset Meczu
                                </button>
                            </div>

                            {/* Info o serwisie */}
                            {!isMatchFinished() && (
                                <div className="mt-6 p-4 bg-blue-50 rounded-lg">
                                    <p className="text-center text-sm">
                                        <span className="font-bold">Serwuje:</span> {lastScorer === 1 ? team1Name : team2Name}
                                    </p>
                                    <p className="text-center text-xs text-gray-600 mt-2">
                                        (Niebieski panel = ostatni punkt i serwis)
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<BadmintonScorer />, document.getElementById('root'));
    </script>
</body>
</html>
